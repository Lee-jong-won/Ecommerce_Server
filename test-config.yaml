config:
  target: "http://64.176.226.236:8080"
  processor: "./OrderAndPayProcessor.js"
  phases:
    - duration: 60
      arrivalRate: 2
      rampTo: 10
      name: "initial-warmup"

    - duration: 60
      arrivalRate: 10
      rampTo: 20
      name: "deep-warmup"

    - duration : 40
      arrivalRate : 20
      rampTo: 30
      name : "rampup"

    - duration : 60
      arrivalRate : 30
      name : "sustained-peak"

    - duration : 30
      arrivalRate : 30
      rampTo: 5
      name : "cooldown"
  plugins:
    metrics-by-endpoint:
      useStyles: true

scenarios:
  - name: "order and pay"
    flow:
      - function: "setUser"
      - function: "setProduct"
      - function: "setOrder"
      - function: "setPay"

      - post:
          url: "/api/order"
          name: "order_api"
          headers:
            Content-Type: application/json
            X-MOCK-USER-LOGINID: "{{ loginId }}"
          json:
            orderName: "{{ orderName }}"
            orderId: "{{ orderId }}"
            orderCreates:
              - productId: "{{ productId }}"
                stockQuantity: 1
          capture:
            - json: "$.totalAmount"
              as: "amount"

      - think: 0.3

      - post:
          name: "payment_api"
          url: "/api/payment"
          headers:
            Content-Type: application/json
            X-MOCK-USER-LOGINID: "{{ loginId }}"
            Idempotency-Key: "{{ idempotencyKey }}"
          json:
            orderId: "{{ orderId }}"
            paymentKey: "{{ paymentKey }}"
            amount: "{{ amount }}"